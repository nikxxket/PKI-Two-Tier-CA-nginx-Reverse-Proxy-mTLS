<!DOCTYPE html>
<html>
<head>
    <title>API Service</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #667eea; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🚀 API Service</h1>
    <div class="info">
        <p><strong>Port:</strong> 3001</p>
        <p><strong>Path:</strong> /api/</p>
        <p><strong>Status:</strong> ✅ Online</p>
    </div>
    <h3>Endpoints:</h3>
    <ul>
        <li>GET /api/users - List of users</li>
        <li>GET /api/status - Server status</li>
    </ul>
</body>
</html>
